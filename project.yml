name: Status
options:
  bundleIdPrefix: com.statusfoundry
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    SWIFT_VERSION: "6.0"
packages:
  StatusPackage:
    path: .
targets:
  macos:
    type: application
    platform: macOS
    sources:
      - apps/macos
    dependencies:
      - package: StatusPackage
        product: StatusUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.statusfoundry.status.mac
        PRODUCT_NAME: Status
        INFOPLIST_FILE: apps/macos/Info.plist
  ios:
    type: application
    platform: iOS
    sources:
      - apps/ios
    dependencies:
      - package: StatusPackage
        product: StatusUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.statusfoundry.status.ios
        PRODUCT_NAME: Status
        INFOPLIST_FILE: apps/ios/Info.plist
schemes:
  macos:
    build:
      targets:
        macos: all
    run:
      config: Debug
  ios:
    build:
      targets:
        ios: all
    run:
      config: Debug
